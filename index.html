<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exemplos Margin, Padding e Border</title>

  <style>
    /* EXEMPLO 1 - MARGIN */
    .margin {
      margin: 50px;
    }

    /* EXEMPLO 2 - PADDING */
    .padding {
      padding: 30px;
    }

    /* EXEMPLO 3 - BORDER */
    .border {
      border: 3px solid black;
    }
  </style>
</head>

<body>

  <h2>Exemplo de Margin</h2>
  <div class="margin">
    Essa exemplo tem margin (espaço fora).
  </div>

  <h2>Exemplo de Padding</h2>
  <div class="padding">
    Essa exemplo tem padding (espaço dentro).
  </div>

  <h2>Exemplo de Border</h2>
  <div class="border">
    Essa exemplo tem border (borda).
  </div>

</body>
</html>
